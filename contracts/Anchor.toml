[toolchain]
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
recur = "5HFL1agQqg6wHeLEsLuJVKdLZbMzAC2rGRQkEWk8smLk"

[programs.localnet]
recur = "5HFL1agQqg6wHeLEsLuJVKdLZbMzAC2rGRQkEWk8smLk"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "/mnt/c/Users/harmi/deploy-key.json"

# ─── Devnet deploy instructions ──────────────────────────
# 1. Fund your deploy keypair:
#      solana airdrop 5 --url devnet
# 2. Build WITHOUT testing feature:
#      anchor build
# 3. Deploy:
#      anchor deploy --provider.cluster devnet
# 4. Update PROGRAM_ID in .env if the address changes.
# ──────────────────────────────────────────────────────────

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
# Enable the `testing` feature so localnet tests can call treasury instructions
# with any funded keypair (bypasses hardcoded multisig key guards).
# IMPORTANT: Do NOT enable this feature for devnet/mainnet builds.
features = ["testing"]
